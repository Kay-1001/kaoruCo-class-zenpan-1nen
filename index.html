<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1c1916">
<title>TOEIC 語彙・文法 100問</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,300..700&family=Noto+Sans+JP:wght@400;500;700&family=Noto+Serif+JP:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #f5f1e8;
    --paper-warm: #ebe5d6;
    --ink: #1c1916;
    --ink-soft: #3a3530;
    --muted: #6b6456;
    --rule: #d4cdba;
    --rule-soft: #e3ddcc;
    --accent: #8b2332;
    --accent-soft: #a84658;
    --correct: #2f5d2f;
    --correct-soft: #d9e5d5;
    --wrong: #8b2332;
    --wrong-soft: #ead5d8;
    --shadow: 0 1px 2px rgba(28,25,22,.04), 0 4px 16px rgba(28,25,22,.06);
    --serif-en: 'Fraunces', 'Noto Serif JP', Georgia, serif;
    --serif-jp: 'Noto Serif JP', 'Yu Mincho', serif;
    --sans-jp: 'Noto Sans JP', -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--paper);
    color: var(--ink);
    font-family: var(--sans-jp);
    font-size: 16px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    -webkit-tap-highlight-color: transparent;
    min-height: 100vh;
  }

  body {
    background-image:
      radial-gradient(circle at 20% 10%, rgba(139,35,50,.03), transparent 40%),
      radial-gradient(circle at 80% 90%, rgba(47,93,47,.03), transparent 40%);
  }

  .app {
    max-width: 720px;
    margin: 0 auto;
    padding: 24px 20px 80px;
    min-height: 100vh;
  }

  /* === HEADER === */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding-bottom: 16px;
    margin-bottom: 24px;
    border-bottom: 1px solid var(--rule);
  }

  .brand {
    font-family: var(--serif-en);
    font-weight: 500;
    font-style: italic;
    font-size: 1.1rem;
    letter-spacing: .02em;
    color: var(--ink);
  }

  .brand-sub {
    font-family: var(--sans-jp);
    font-size: .75rem;
    color: var(--muted);
    margin-left: 10px;
    font-style: normal;
    letter-spacing: .05em;
  }

  .meta {
    font-family: var(--serif-en);
    font-size: .85rem;
    color: var(--muted);
    font-variant-numeric: tabular-nums;
  }

  /* === PROGRESS BAR === */
  .progress-wrap {
    margin-bottom: 32px;
  }

  .progress-bar {
    height: 3px;
    background: var(--rule-soft);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--ink);
    transition: width .4s cubic-bezier(.4,0,.2,1);
  }

  .progress-stats {
    display: flex;
    justify-content: space-between;
    margin-top: 8px;
    font-family: var(--serif-en);
    font-size: .8rem;
    color: var(--muted);
    font-variant-numeric: tabular-nums;
  }

  .progress-stats strong {
    color: var(--ink);
    font-weight: 500;
  }

  /* === START SCREEN === */
  .start {
    padding: 40px 0;
    text-align: left;
  }

  .start-eyebrow {
    font-family: var(--serif-en);
    font-style: italic;
    font-size: 1rem;
    color: var(--accent);
    margin-bottom: 8px;
    letter-spacing: .02em;
  }

  .start-title {
    font-family: var(--serif-jp);
    font-size: clamp(1.8rem, 5vw, 2.4rem);
    font-weight: 700;
    line-height: 1.25;
    margin-bottom: 4px;
    letter-spacing: -.01em;
  }

  .start-title-en {
    font-family: var(--serif-en);
    font-size: clamp(1.3rem, 4vw, 1.8rem);
    font-weight: 400;
    font-style: italic;
    color: var(--ink-soft);
    margin-bottom: 28px;
    letter-spacing: -.01em;
  }

  .start-desc {
    font-size: .95rem;
    color: var(--ink-soft);
    max-width: 540px;
    margin-bottom: 32px;
    line-height: 1.75;
  }

  .start-specs {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0;
    margin-bottom: 40px;
    border-top: 1px solid var(--rule);
    border-bottom: 1px solid var(--rule);
  }

  .spec {
    padding: 16px 14px;
    border-right: 1px solid var(--rule);
  }
  .spec:last-child { border-right: none; }

  .spec-label {
    font-family: var(--serif-en);
    font-style: italic;
    font-size: .7rem;
    color: var(--muted);
    letter-spacing: .08em;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .spec-value {
    font-family: var(--serif-en);
    font-size: 1.4rem;
    font-weight: 500;
    color: var(--ink);
    font-variant-numeric: tabular-nums;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 14px 28px;
    font-family: var(--sans-jp);
    font-size: 1rem;
    font-weight: 500;
    background: var(--ink);
    color: var(--paper);
    border: none;
    cursor: pointer;
    letter-spacing: .02em;
    transition: transform .15s, background .15s;
  }

  .btn:hover { background: var(--ink-soft); }
  .btn:active { transform: translateY(1px); }

  .btn-ghost {
    background: transparent;
    color: var(--ink);
    border: 1px solid var(--ink);
    padding: 13px 27px;
  }
  .btn-ghost:hover { background: var(--ink); color: var(--paper); }

  .btn-arrow {
    font-family: var(--serif-en);
    font-style: italic;
    font-size: 1.05rem;
  }

  .btn-row {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    margin-bottom: 24px;
  }

  .resume-note {
    background: var(--paper-warm);
    padding: 14px 16px;
    margin-bottom: 20px;
    font-size: .85rem;
    color: var(--ink-soft);
    border-left: 3px solid var(--accent);
  }

  /* === QUIZ SCREEN === */
  .question-num {
    font-family: var(--serif-en);
    font-style: italic;
    font-size: .85rem;
    color: var(--muted);
    letter-spacing: .05em;
    margin-bottom: 12px;
  }

  .question-num::before {
    content: "—— ";
    color: var(--rule);
  }

  .question {
    font-family: var(--serif-en);
    font-size: clamp(1.15rem, 3.5vw, 1.4rem);
    line-height: 1.6;
    margin-bottom: 28px;
    color: var(--ink);
    font-weight: 400;
    letter-spacing: -.005em;
  }

  .options {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 24px;
  }

  .option {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 14px 18px;
    background: transparent;
    border: 1px solid var(--rule);
    text-align: left;
    cursor: pointer;
    font-family: var(--serif-en);
    font-size: 1.02rem;
    color: var(--ink);
    transition: all .15s;
    width: 100%;
    line-height: 1.4;
  }

  .option:hover:not(:disabled) {
    border-color: var(--ink);
    background: var(--paper-warm);
  }

  .option:disabled { cursor: default; }

  .option-letter {
    font-family: var(--serif-en);
    font-style: italic;
    font-weight: 500;
    color: var(--muted);
    min-width: 20px;
    flex-shrink: 0;
  }

  .option-text {
    flex: 1;
  }

  .option.correct {
    border-color: var(--correct);
    background: var(--correct-soft);
    color: var(--correct);
  }
  .option.correct .option-letter { color: var(--correct); }

  .option.wrong {
    border-color: var(--wrong);
    background: var(--wrong-soft);
    color: var(--wrong);
  }
  .option.wrong .option-letter { color: var(--wrong); }

  .option.dimmed {
    opacity: .55;
  }

  /* === FEEDBACK === */
  .feedback {
    margin-top: 8px;
    padding: 20px 22px;
    border-left: 3px solid var(--ink);
    background: var(--paper-warm);
    animation: slideIn .3s ease-out;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .feedback.correct { border-left-color: var(--correct); }
  .feedback.wrong { border-left-color: var(--wrong); }

  .feedback-verdict {
    font-family: var(--serif-en);
    font-style: italic;
    font-size: 1rem;
    font-weight: 500;
    margin-bottom: 10px;
    letter-spacing: .02em;
  }

  .feedback.correct .feedback-verdict { color: var(--correct); }
  .feedback.wrong .feedback-verdict { color: var(--wrong); }

  .feedback-verdict-jp {
    font-family: var(--sans-jp);
    font-size: .75rem;
    font-weight: 500;
    font-style: normal;
    color: var(--muted);
    margin-left: 8px;
    letter-spacing: .05em;
  }

  .feedback-body {
    font-size: .92rem;
    line-height: 1.75;
    color: var(--ink-soft);
  }

  .feedback-correct-answer {
    font-family: var(--serif-en);
    color: var(--ink);
    font-weight: 500;
    font-style: italic;
  }

  /* === NAV === */
  .nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 28px;
    gap: 12px;
  }

  .nav-quit {
    font-family: var(--serif-en);
    font-style: italic;
    font-size: .85rem;
    color: var(--muted);
    background: none;
    border: none;
    cursor: pointer;
    padding: 8px 4px;
    text-decoration: underline;
    text-decoration-color: var(--rule);
    text-underline-offset: 4px;
  }
  .nav-quit:hover { color: var(--ink); }

  /* === RESULTS === */
  .results {
    padding: 20px 0;
  }

  .results-eyebrow {
    font-family: var(--serif-en);
    font-style: italic;
    color: var(--accent);
    font-size: 1rem;
    margin-bottom: 8px;
  }

  .results-title {
    font-family: var(--serif-jp);
    font-size: clamp(1.8rem, 5vw, 2.4rem);
    font-weight: 700;
    margin-bottom: 32px;
    line-height: 1.25;
  }

  .score-display {
    display: flex;
    align-items: baseline;
    gap: 16px;
    margin-bottom: 8px;
  }

  .score-big {
    font-family: var(--serif-en);
    font-size: clamp(4rem, 14vw, 6rem);
    font-weight: 300;
    line-height: 1;
    color: var(--ink);
    letter-spacing: -.02em;
    font-variant-numeric: tabular-nums;
  }

  .score-big sup {
    font-size: .4em;
    font-style: italic;
    color: var(--muted);
    font-weight: 400;
    margin-left: 4px;
  }

  .score-label {
    font-family: var(--serif-en);
    font-style: italic;
    color: var(--muted);
    font-size: 1rem;
  }

  .score-breakdown {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0;
    margin: 32px 0;
    border-top: 1px solid var(--rule);
    border-bottom: 1px solid var(--rule);
  }

  .score-cell {
    padding: 16px 12px;
    border-right: 1px solid var(--rule);
  }
  .score-cell:last-child { border-right: none; }

  .score-cell-label {
    font-family: var(--serif-en);
    font-style: italic;
    font-size: .7rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .08em;
    margin-bottom: 4px;
  }

  .score-cell-value {
    font-family: var(--serif-en);
    font-size: 1.4rem;
    font-weight: 500;
    font-variant-numeric: tabular-nums;
  }

  .score-cell.correct .score-cell-value { color: var(--correct); }
  .score-cell.wrong .score-cell-value { color: var(--wrong); }

  .results-msg {
    font-family: var(--serif-en);
    font-style: italic;
    font-size: 1.1rem;
    color: var(--ink-soft);
    margin-bottom: 32px;
    line-height: 1.6;
  }

  /* === REVIEW LIST === */
  .review-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 20px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--rule);
  }

  .review-title {
    font-family: var(--serif-en);
    font-style: italic;
    font-size: 1.1rem;
    color: var(--ink);
  }

  .review-title-jp {
    font-family: var(--sans-jp);
    font-size: .8rem;
    color: var(--muted);
    margin-left: 8px;
    letter-spacing: .05em;
  }

  .review-count {
    font-family: var(--serif-en);
    font-size: .85rem;
    color: var(--muted);
    font-variant-numeric: tabular-nums;
  }

  /* === UTILITIES === */
  .hidden { display: none !important; }

  .footer {
    margin-top: 60px;
    padding-top: 20px;
    border-top: 1px solid var(--rule);
    text-align: center;
    font-family: var(--serif-en);
    font-style: italic;
    font-size: .75rem;
    color: var(--muted);
    letter-spacing: .03em;
  }

  /* Mobile tweaks */
  @media (max-width: 520px) {
    .app { padding: 20px 16px 60px; }
    .start-specs, .score-breakdown {
      grid-template-columns: repeat(3, 1fr);
    }
    .spec, .score-cell { padding: 12px 8px; }
    .spec-value, .score-cell-value { font-size: 1.15rem; }
    .question { font-size: 1.1rem; }
    .option { font-size: .98rem; padding: 12px 14px; }
    .btn { padding: 12px 22px; font-size: .95rem; }
  }

  /* Print-like paper texture subtle */
  .app::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    background-image: radial-gradient(circle at 1px 1px, rgba(28,25,22,.015) 1px, transparent 0);
    background-size: 3px 3px;
    z-index: 0;
  }
  .app > * { position: relative; z-index: 1; }
</style>
</head>
<body>
<div class="app" id="app"></div>

<script>
// =============================================================================
// QUESTION DATA
// =============================================================================
const QUESTIONS = [];
const QUESTIONS_DATA = [
  {
    q: "The meeting was cancelled, but we decided to hold a brief discussion _____.",
    opts: ["although", "however", "anyway", "despite"],
    ans: 3,
    exp: "anyway は「とにかく、それでも」を表す文末副詞。although/despite は接続詞・前置詞で節や名詞句を従える。however は副詞だが文頭・文中の位置が一般的。文末で「それでも」の含意を出せるのは anyway のみ。"
  },
  {
    q: "_____ the CEO's announcement, shares of the company rose sharply.",
    opts: ["Followed", "Following", "Follows", "Follow"],
    ans: 2,
    exp: "Following + N で「～に続いて、～の後で」という前置詞的用法。After とほぼ同義。Follows（三単現）・Follow（原形）・Followed（過去/過去分詞）はいずれも文法構造に合わない。"
  },
  {
    q: "Please _____ the user manual for detailed installation instructions.",
    opts: ["look for", "point at", "notice of", "refer to"],
    ans: 4,
    exp: "refer to は「～を参照する、参考にする」。refer は自動詞なので前置詞 to が必要。look for（探す）、point at（物理的に指差す）は意味不適。notice of は動詞＋前置詞の組み合わせとして成立しない。"
  },
  {
    q: "The latest financial report is now _____ on the company website.",
    opts: ["available", "possible", "capable", "reachable"],
    ans: 1,
    exp: "available は「入手可能な、利用できる」。報告書がサイト上で閲覧できる状態を表す。possible は「起こりうる」、capable は「（人・物が）能力を持つ」、reachable は「到達可能な」で物理的・抽象的距離を指すため不自然。"
  },
  {
    q: "Please submit your vacation request to the Human Resources _____ by Friday.",
    opts: ["application", "committee", "department", "interview"],
    ans: 3,
    exp: "Human Resources Department（人事部）は組織の部署名として定型。committee（委員会）は特定目的の合議体、interview（面接）と application（申請書）は別カテゴリの名詞。"
  },
  {
    q: "The annual sales _____ will be held in Chicago next month.",
    opts: ["appointment", "conference", "interview", "session"],
    ans: 2,
    exp: "conference は大規模な会議・カンファレンス。annual sales conference は営業関連の年次会合として定型。appointment は個人的な予約、interview は面接、session は会期や一コマの会合で、大規模な年次会合には通常使わない。"
  },
  {
    q: "_____ the latest survey, customer satisfaction has improved significantly.",
    opts: ["According to", "Based with", "Depending on", "Regardless of"],
    ans: 1,
    exp: "According to ～「～によれば」は情報源を示す定型句。Based with は誤用（正しくは based on）、Depending on は「～次第で」、Regardless of は「～に関係なく」で意味が合わない。"
  },
  {
    q: "Given the current market conditions, prices are _____ to rise next quarter.",
    opts: ["possible", "probable", "available", "likely"],
    ans: 4,
    exp: "be likely to do「～しそうである」の構文。likely は形容詞＋to不定詞をとれる。possible と probable はこの構文では不自然で、通常 It is possible/probable that ～ の形をとる。available は意味不適。"
  },
  {
    q: "As part of the promotion, the company will _____ a 20% discount to loyal customers.",
    opts: ["afford", "offer", "spend", "cost"],
    ans: 2,
    exp: "offer O to O'「顧客に割引を提供する」の構文。afford は「余裕がある」、spend は「使う」、cost は「費用がかかる」で、割引を提供する意味にはならない。"
  },
  {
    q: "The factory recently installed new _____ to improve efficiency.",
    opts: ["equipments", "equipment", "an equipment", "equipping"],
    ans: 2,
    exp: "equipment は不可算名詞。複数形 equipments や不定冠詞 an equipment は文法的に誤り。equipping（動名詞）も new equipment の位置には合わない。TOEIC頻出の不可算名詞。"
  },
  {
    q: "The hotel will _____ complimentary breakfast for all registered guests.",
    opts: ["propose", "prepare for", "provide", "present with"],
    ans: 3,
    exp: "provide は「（物・サービス）を提供する」。propose は「提案する」で計画やアイデアが対象。prepare for は「～のために準備する」で直接目的語ではなく前置詞を挟む。present with は「人に～を贈呈する」で目的語の順序が異なる。"
  },
  {
    q: "Many residents prefer to shop at _____ stores rather than large chain supermarkets.",
    opts: ["native", "inner", "personal", "local"],
    ans: 4,
    exp: "local は「地元の、地域の」。大手チェーンとの対比として local stores（地元の店）が自然。native は「原産の、生まれつきの」、inner は「内側の」、personal は「個人の」で店舗を修飾する語として不適。"
  },
  {
    q: "Customers who _____ items online can track their orders through our website.",
    opts: ["purchase", "pay", "order for", "buy of"],
    ans: 1,
    exp: "purchase は「購入する」で他動詞、直接目的語をとる。pay は pay for ～（～の代金を払う）の形、order は通常 for 不要、buy of は非標準。purchase が最も直接的で自然。"
  },
  {
    q: "The grand _____ of the new store will take place next Saturday.",
    opts: ["beginning", "opening", "starting", "origin"],
    ans: 2,
    exp: "grand opening は「（新店舗の）グランドオープン」の定型句。beginning や starting は「動作の開始」に近く、origin は「起源」で店舗開業の意味にならない。"
  },
  {
    q: "The _____ of the new office building will be completed by December.",
    opts: ["construct", "constructive", "construction", "constructed"],
    ans: 3,
    exp: "the ___ of ～ の空所には名詞が入る。construct は動詞、constructive は形容詞（建設的な）、constructed は過去分詞。名詞の construction（建設）のみが文法的に適合。"
  },
  {
    q: "The factory offers a free guided _____ of its production line every Friday.",
    opts: ["tour", "trip", "journey", "pathway"],
    ans: 1,
    exp: "guided tour は「ガイド付き見学」の定型。工場見学の意味で自然。trip は「短い旅行」、journey は「長旅・道のり」、pathway は「小道・経路」で、案内付きの見学の意味にはならない。"
  },
  {
    q: "The company invested heavily in _____ and development last year.",
    opts: ["researches", "researching", "researcher", "research"],
    ans: 4,
    exp: "research は通常不可算名詞で、複数形 researches は学術的・古い用法に限られる。research and development（研究開発、R&D）は定型句。researcher は「研究者」、researching は動名詞で and development との並列に不自然。"
  },
  {
    q: "All managers are required to _____ the quarterly planning meeting.",
    opts: ["attend to", "attend", "participate", "join in"],
    ans: 2,
    exp: "attend「出席する」は他動詞で、直接目的語をとる。attend to は「～の世話をする、対処する」で意味が異なる。participate は participate in、join in も in が必要で、前置詞なしの meeting を直接目的語にとれない。"
  },

// =============================================================================
// QUIZ LOGIC
// =============================================================================
(function() {
  const STORAGE_KEY = 'toeic_quiz_progress_v1';
  const TOTAL = 0; // will be set after data loaded
  const app = document.getElementById('app');

  let state = {
    mode: 'start',      // 'start' | 'quiz' | 'result' | 'review'
    index: 0,           // current question index
    answers: [],        // array of {chosen: 1-4, correct: boolean} or null
    answered: false,    // has user answered current question
    reviewList: [],     // indices of wrong questions for review
    reviewPos: 0,       // position in reviewList
  };

  function save() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        index: state.index,
        answers: state.answers,
      }));
    } catch(e) {}
  }

  function load() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return null;
      return JSON.parse(raw);
    } catch(e) { return null; }
  }

  function clearSave() {
    try { localStorage.removeItem(STORAGE_KEY); } catch(e) {}
  }

  function countAnswered() {
    return state.answers.filter(a => a != null).length;
  }

  function countCorrect() {
    return state.answers.filter(a => a && a.correct).length;
  }

  function countWrong() {
    return state.answers.filter(a => a && !a.correct).length;
  }

  function render() {
    if (state.mode === 'start') renderStart();
    else if (state.mode === 'quiz') renderQuiz();
    else if (state.mode === 'result') renderResult();
    else if (state.mode === 'review') renderReview();
    window.scrollTo({top:0, behavior:'instant'});
  }

  function renderHeader(showMeta) {
    const answered = countAnswered();
    const total = QUESTIONS.length;
    const correct = countCorrect();
    const percent = answered > 0 ? Math.round((correct / answered) * 100) : 0;
    return `
      <div class="header">
        <div class="brand">TOEIC Vocab &amp; Grammar <span class="brand-sub">語彙・文法 100</span></div>
        ${showMeta ? `<div class="meta">${answered}/${total} · ${percent}%</div>` : ''}
      </div>
    `;
  }

  function renderProgress() {
    const answered = countAnswered();
    const total = QUESTIONS.length;
    const correct = countCorrect();
    const wrong = countWrong();
    const percent = (answered / total) * 100;
    return `
      <div class="progress-wrap">
        <div class="progress-bar">
          <div class="progress-fill" style="width:${percent}%"></div>
        </div>
        <div class="progress-stats">
          <span>Q.${state.index + 1} <strong>/ ${total}</strong></span>
          <span>正答 <strong>${correct}</strong> · 誤答 <strong>${wrong}</strong></span>
        </div>
      </div>
    `;
  }

  function renderStart() {
    const saved = load();
    const hasSaved = saved && saved.answers && saved.answers.some(a => a != null);
    const answered = hasSaved ? saved.answers.filter(a => a != null).length : 0;
    const correct = hasSaved ? saved.answers.filter(a => a && a.correct).length : 0;

    app.innerHTML = `
      ${renderHeader(false)}
      <div class="start">
        <div class="start-eyebrow">Practice Set · for Japanese Learners</div>
        <h1 class="start-title">TOEIC 語彙・文法</h1>
        <div class="start-title-en">100 Questions in Business Context</div>
        <p class="start-desc">
          Part 5 形式の短文穴埋め問題集。ビジネス頻出語彙とコロケーション、文法項目を網羅した100問。
          1問ずつ即時に正誤判定と解説が表示され、スコアは自動で保存される。
        </p>

        <div class="start-specs">
          <div class="spec">
            <div class="spec-label">Questions</div>
            <div class="spec-value">100</div>
          </div>
          <div class="spec">
            <div class="spec-label">Format</div>
            <div class="spec-value">4 Choice</div>
          </div>
          <div class="spec">
            <div class="spec-label">Focus</div>
            <div class="spec-value">Part 5</div>
          </div>
        </div>

        ${hasSaved ? `
          <div class="resume-note">
            前回の記録：<strong>${answered}/${QUESTIONS.length}問</strong> 回答済み・正答 <strong>${correct}</strong>問
          </div>
        ` : ''}

        <div class="btn-row">
          ${hasSaved ? `
            <button class="btn" data-action="resume">
              続きから <span class="btn-arrow">→</span>
            </button>
            <button class="btn btn-ghost" data-action="restart">最初から</button>
          ` : `
            <button class="btn" data-action="start">
              開始する <span class="btn-arrow">→</span>
            </button>
          `}
        </div>

        <div class="footer">Ink on paper · offline-ready</div>
      </div>
    `;

    app.querySelectorAll('[data-action]').forEach(el => {
      el.addEventListener('click', () => {
        const act = el.dataset.action;
        if (act === 'start' || act === 'restart') {
          state.answers = new Array(QUESTIONS.length).fill(null);
          state.index = 0;
          state.answered = false;
          state.mode = 'quiz';
          clearSave();
          render();
        } else if (act === 'resume') {
          const s = load();
          state.answers = s.answers && s.answers.length === QUESTIONS.length
            ? s.answers
            : new Array(QUESTIONS.length).fill(null);
          state.index = typeof s.index === 'number' ? Math.min(s.index, QUESTIONS.length - 1) : 0;
          state.answered = state.answers[state.index] != null;
          state.mode = 'quiz';
          render();
        }
      });
    });
  }

  function renderQuiz() {
    const q = QUESTIONS[state.index];
    const existing = state.answers[state.index];
    const answered = existing != null;
    state.answered = answered;

    app.innerHTML = `
      ${renderHeader(true)}
      ${renderProgress()}
      <div class="question-num">Question ${state.index + 1}</div>
      <div class="question">${escapeHtml(q.q)}</div>
      <div class="options">
        ${q.opts.map((opt, i) => {
          const num = i + 1;
          const letter = String.fromCharCode(65 + i);
          let cls = 'option';
          if (answered) {
            cls += ' dimmed';
            if (num === q.ans) cls = 'option correct';
            else if (num === existing.chosen) cls = 'option wrong';
          }
          return `
            <button class="${cls}" data-num="${num}" ${answered ? 'disabled' : ''}>
              <span class="option-letter">(${letter})</span>
              <span class="option-text">${escapeHtml(opt)}</span>
            </button>
          `;
        }).join('')}
      </div>
      ${answered ? renderFeedback(q, existing) : ''}
      <div class="nav">
        <button class="nav-quit" data-action="quit">一時中断して最初に戻る</button>
        ${answered ? `
          <button class="btn" data-action="next">
            ${state.index === QUESTIONS.length - 1 ? '結果を見る' : '次の問題'} <span class="btn-arrow">→</span>
          </button>
        ` : ''}
      </div>
    `;

    app.querySelectorAll('.option:not([disabled])').forEach(el => {
      el.addEventListener('click', () => {
        const num = parseInt(el.dataset.num, 10);
        const correct = num === q.ans;
        state.answers[state.index] = { chosen: num, correct: correct };
        state.answered = true;
        save();
        render();
      });
    });

    app.querySelectorAll('[data-action]').forEach(el => {
      el.addEventListener('click', () => {
        const act = el.dataset.action;
        if (act === 'next') {
          if (state.index === QUESTIONS.length - 1) {
            state.mode = 'result';
          } else {
            state.index++;
            state.answered = state.answers[state.index] != null;
          }
          save();
          render();
        } else if (act === 'quit') {
          state.mode = 'start';
          render();
        }
      });
    });
  }

  function renderFeedback(q, ans) {
    const isCorrect = ans.correct;
    const letter = String.fromCharCode(64 + q.ans);
    return `
      <div class="feedback ${isCorrect ? 'correct' : 'wrong'}">
        <div class="feedback-verdict">
          ${isCorrect ? 'Correct' : 'Incorrect'}
          <span class="feedback-verdict-jp">${isCorrect ? '正解' : '不正解'} · 正答は (${letter}) <span class="feedback-correct-answer">${escapeHtml(q.opts[q.ans - 1])}</span></span>
        </div>
        <div class="feedback-body">${escapeHtml(q.exp)}</div>
      </div>
    `;
  }

  function renderResult() {
    const answered = countAnswered();
    const correct = countCorrect();
    const wrong = answered - correct;
    const percent = answered > 0 ? Math.round((correct / answered) * 100) : 0;

    let msg = '';
    if (percent >= 90) msg = 'Excellent — 9割超え。この水準を維持。';
    else if (percent >= 75) msg = 'Strong — 安定した実力。誤答を見直して完璧に。';
    else if (percent >= 60) msg = 'Solid — 基礎は固まっている。弱点を潰していこう。';
    else if (percent >= 40) msg = 'Building — 復習モードで間違いを潰そう。';
    else msg = 'Starting out — まずは解説を読み込んで、再挑戦を。';

    const wrongIndices = state.answers
      .map((a, i) => (a && !a.correct) ? i : -1)
      .filter(i => i >= 0);

    app.innerHTML = `
      ${renderHeader(false)}
      <div class="results">
        <div class="results-eyebrow">Result</div>
        <h1 class="results-title">お疲れさまでした。</h1>

        <div class="score-display">
          <div class="score-big">${percent}<sup>%</sup></div>
          <div class="score-label">accuracy</div>
        </div>

        <div class="score-breakdown">
          <div class="score-cell">
            <div class="score-cell-label">Answered</div>
            <div class="score-cell-value">${answered} / ${QUESTIONS.length}</div>
          </div>
          <div class="score-cell correct">
            <div class="score-cell-label">Correct</div>
            <div class="score-cell-value">${correct}</div>
          </div>
          <div class="score-cell wrong">
            <div class="score-cell-label">Wrong</div>
            <div class="score-cell-value">${wrong}</div>
          </div>
        </div>

        <p class="results-msg">${msg}</p>

        <div class="btn-row">
          ${wrong > 0 ? `<button class="btn" data-action="review">間違いを復習 <span class="btn-arrow">→</span></button>` : ''}
          <button class="btn btn-ghost" data-action="restart">最初から解き直す</button>
        </div>

        <div class="footer">${new Date().toLocaleDateString('ja-JP', {year:'numeric', month:'long', day:'numeric'})}</div>
      </div>
    `;

    app.querySelectorAll('[data-action]').forEach(el => {
      el.addEventListener('click', () => {
        const act = el.dataset.action;
        if (act === 'review') {
          state.reviewList = wrongIndices;
          state.reviewPos = 0;
          state.mode = 'review';
          render();
        } else if (act === 'restart') {
          state.answers = new Array(QUESTIONS.length).fill(null);
          state.index = 0;
          state.answered = false;
          state.mode = 'quiz';
          clearSave();
          render();
        }
      });
    });
  }

  function renderReview() {
    if (state.reviewList.length === 0) {
      state.mode = 'result';
      render();
      return;
    }

    const qIdx = state.reviewList[state.reviewPos];
    const q = QUESTIONS[qIdx];
    const existing = state.answers[qIdx];
    const reviewTotal = state.reviewList.length;

    app.innerHTML = `
      ${renderHeader(false)}
      <div class="review-header">
        <div class="review-title">Review<span class="review-title-jp">間違えた問題の復習</span></div>
        <div class="review-count">${state.reviewPos + 1} / ${reviewTotal}</div>
      </div>
      <div class="question-num">Question ${qIdx + 1}</div>
      <div class="question">${escapeHtml(q.q)}</div>
      <div class="options">
        ${q.opts.map((opt, i) => {
          const num = i + 1;
          const letter = String.fromCharCode(65 + i);
          let cls = 'option dimmed';
          if (num === q.ans) cls = 'option correct';
          else if (existing && num === existing.chosen) cls = 'option wrong';
          return `
            <button class="${cls}" disabled>
              <span class="option-letter">(${letter})</span>
              <span class="option-text">${escapeHtml(opt)}</span>
            </button>
          `;
        }).join('')}
      </div>
      ${renderFeedback(q, existing || {chosen: 0, correct: false})}
      <div class="nav">
        <button class="nav-quit" data-action="result">結果に戻る</button>
        <div style="display:flex;gap:10px;">
          ${state.reviewPos > 0 ? `<button class="btn btn-ghost" data-action="prev">← 前</button>` : ''}
          ${state.reviewPos < reviewTotal - 1 ? `<button class="btn" data-action="next">次 →</button>` : `<button class="btn" data-action="result">完了 →</button>`}
        </div>
      </div>
    `;

    app.querySelectorAll('[data-action]').forEach(el => {
      el.addEventListener('click', () => {
        const act = el.dataset.action;
        if (act === 'next') { state.reviewPos++; render(); }
        else if (act === 'prev') { state.reviewPos--; render(); }
        else if (act === 'result') { state.mode = 'result'; render(); }
      });
    });
  }

  function escapeHtml(s) {
    return String(s)
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;')
      .replace(/'/g,'&#39;');
  }

  // Initialize on load
  document.addEventListener('DOMContentLoaded', () => {
    state.answers = new Array(QUESTIONS.length).fill(null);
    render();
  });

  // also run immediately in case DOMContentLoaded already fired
  if (document.readyState === 'loading') {
    // wait
  } else {
    state.answers = new Array(QUESTIONS.length).fill(null);
    render();
  }
})();
</script>
</body>
</html>
