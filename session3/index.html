<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1c1916">
<meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
<meta name="googlebot" content="noindex, nofollow">
<meta name="GPTBot" content="noindex, nofollow">
<meta name="ClaudeBot" content="noindex, nofollow">
<title>TOEIC用語彙 100問</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,300..700&family=Noto+Sans+JP:wght@400;500;700&family=Noto+Serif+JP:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #f5f1e8;
    --paper-warm: #ebe5d6;
    --ink: #1c1916;
    --ink-soft: #3a3530;
    --muted: #6b6456;
    --rule: #d4cdba;
    --rule-soft: #e3ddcc;
    --accent: #8b2332;
    --accent-soft: #a84658;
    --correct: #2f5d2f;
    --correct-soft: #d9e5d5;
    --wrong: #8b2332;
    --wrong-soft: #ead5d8;
    --shadow: 0 1px 2px rgba(28,25,22,.04), 0 4px 16px rgba(28,25,22,.06);
    --serif-en: 'Fraunces', 'Noto Serif JP', Georgia, serif;
    --serif-jp: 'Noto Serif JP', 'Yu Mincho', serif;
    --sans-jp: 'Noto Sans JP', -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--paper);
    color: var(--ink);
    font-family: var(--sans-jp);
    font-size: 16px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    -webkit-tap-highlight-color: transparent;
    min-height: 100vh;
  }

  body {
    background-image:
      radial-gradient(circle at 20% 10%, rgba(139,35,50,.03), transparent 40%),
      radial-gradient(circle at 80% 90%, rgba(47,93,47,.03), transparent 40%);
  }

  .app {
    max-width: 720px;
    margin: 0 auto;
    padding: 24px 20px 80px;
    min-height: 100vh;
  }

  /* === HEADER === */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding-bottom: 16px;
    margin-bottom: 24px;
    border-bottom: 1px solid var(--rule);
  }

  .brand {
    font-family: var(--serif-en);
    font-weight: 500;
    font-style: italic;
    font-size: 1.1rem;
    letter-spacing: .02em;
    color: var(--ink);
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  .brand-session {
    display: inline-block;
    padding: 3px 10px 4px;
    background: var(--ink);
    color: var(--paper);
    font-family: var(--serif-jp);
    font-size: .78rem;
    font-style: normal;
    font-weight: 500;
    letter-spacing: .08em;
    line-height: 1;
    vertical-align: 2px;
  }

  .brand-main {
    font-family: var(--serif-en);
    font-style: italic;
    font-weight: 500;
  }

  .brand-sub {
    font-family: var(--sans-jp);
    font-size: .75rem;
    color: var(--muted);
    font-style: normal;
    letter-spacing: .05em;
  }

  @media (max-width: 520px) {
    .brand { font-size: .95rem; gap: 8px; }
    .brand-session { font-size: .72rem; padding: 2px 8px 3px; }
  }

  .meta {
    font-family: var(--serif-en);
    font-size: .85rem;
    color: var(--muted);
    font-variant-numeric: tabular-nums;
  }

  /* === PROGRESS BAR === */
  .progress-wrap {
    margin-bottom: 32px;
  }

  .progress-bar {
    height: 3px;
    background: var(--rule-soft);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--ink);
    transition: width .4s cubic-bezier(.4,0,.2,1);
  }

  .progress-stats {
    display: flex;
    justify-content: space-between;
    margin-top: 8px;
    font-family: var(--serif-en);
    font-size: .8rem;
    color: var(--muted);
    font-variant-numeric: tabular-nums;
  }

  .progress-stats strong {
    color: var(--ink);
    font-weight: 500;
  }

  /* === START SCREEN === */
  .start {
    padding: 40px 0;
    text-align: left;
  }

  .start-eyebrow {
    font-family: var(--serif-en);
    font-style: italic;
    font-size: 1rem;
    color: var(--accent);
    margin-bottom: 8px;
    letter-spacing: .02em;
  }

  .start-title {
    font-family: var(--serif-jp);
    font-size: clamp(1.8rem, 5vw, 2.4rem);
    font-weight: 700;
    line-height: 1.25;
    margin-bottom: 4px;
    letter-spacing: -.01em;
  }

  .start-title-en {
    font-family: var(--serif-en);
    font-size: clamp(1.3rem, 4vw, 1.8rem);
    font-weight: 400;
    font-style: italic;
    color: var(--ink-soft);
    margin-bottom: 28px;
    letter-spacing: -.01em;
  }

  .start-desc {
    font-size: .95rem;
    color: var(--ink-soft);
    max-width: 540px;
    margin-bottom: 32px;
    line-height: 1.75;
  }

  .start-specs {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0;
    margin-bottom: 40px;
    border-top: 1px solid var(--rule);
    border-bottom: 1px solid var(--rule);
  }

  .spec {
    padding: 16px 14px;
    border-right: 1px solid var(--rule);
  }
  .spec:last-child { border-right: none; }

  .spec-label {
    font-family: var(--serif-en);
    font-style: italic;
    font-size: .7rem;
    color: var(--muted);
    letter-spacing: .08em;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .spec-value {
    font-family: var(--serif-en);
    font-size: 1.4rem;
    font-weight: 500;
    color: var(--ink);
    font-variant-numeric: tabular-nums;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 14px 28px;
    font-family: var(--sans-jp);
    font-size: 1rem;
    font-weight: 500;
    background: var(--ink);
    color: var(--paper);
    border: none;
    cursor: pointer;
    letter-spacing: .02em;
    transition: transform .15s, background .15s;
  }

  .btn:hover { background: var(--ink-soft); }
  .btn:active { transform: translateY(1px); }

  .btn-ghost {
    background: transparent;
    color: var(--ink);
    border: 1px solid var(--ink);
    padding: 13px 27px;
  }
  .btn-ghost:hover { background: var(--ink); color: var(--paper); }

  .btn-arrow {
    font-family: var(--serif-en);
    font-style: italic;
    font-size: 1.05rem;
  }

  .btn-row {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    margin-bottom: 24px;
  }

  .resume-note {
    background: var(--paper-warm);
    padding: 14px 16px;
    margin-bottom: 20px;
    font-size: .85rem;
    color: var(--ink-soft);
    border-left: 3px solid var(--accent);
    line-height: 1.7;
  }

  /* === NAME FORM === */
  .name-form {
    margin-bottom: 28px;
    padding: 20px 22px;
    background: rgba(255,255,255,.4);
    border: 1px solid var(--rule);
  }

  .name-field {
    margin-bottom: 14px;
  }
  .name-field:last-of-type { margin-bottom: 0; }

  .name-label {
    display: block;
    font-family: var(--serif-en);
    font-style: italic;
    font-size: .78rem;
    color: var(--muted);
    letter-spacing: .06em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .name-label .jp {
    font-family: var(--sans-jp);
    font-style: normal;
    font-size: .72rem;
    color: var(--ink-soft);
    margin-left: 8px;
    letter-spacing: .02em;
    text-transform: none;
  }

  .name-input {
    width: 100%;
    padding: 11px 14px;
    font-family: var(--sans-jp);
    font-size: 1rem;
    background: var(--paper);
    border: 1px solid var(--rule);
    color: var(--ink);
    transition: border-color .15s, background .15s;
    border-radius: 0;
  }

  .name-input:focus {
    outline: none;
    border-color: var(--ink);
    background: #fff;
  }

  .name-error {
    font-family: var(--sans-jp);
    font-size: .82rem;
    color: var(--wrong);
    margin-top: 10px;
    min-height: 1em;
    font-weight: 500;
  }

  /* === STUDENT BANNER (Result Screen) === */
  .student-banner {
    padding: 16px 20px;
    margin-bottom: 28px;
    background: var(--ink);
    color: var(--paper);
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 20px;
    flex-wrap: wrap;
  }

  .student-name-jp {
    font-family: var(--serif-en);
    font-style: italic;
    font-size: .7rem;
    color: var(--paper);
    opacity: .65;
    letter-spacing: .1em;
    text-transform: uppercase;
    margin-right: 10px;
  }

  .student-name {
    font-family: var(--serif-jp);
    font-size: 1.2rem;
    color: var(--paper);
    font-weight: 500;
    letter-spacing: .01em;
  }

  .student-id {
    font-family: var(--serif-en);
    font-size: .95rem;
    color: var(--paper);
    opacity: .75;
    font-variant-numeric: tabular-nums;
  }

  .student-datetime {
    font-family: var(--serif-en);
    font-size: .85rem;
    color: var(--paper);
    opacity: .7;
    font-variant-numeric: tabular-nums;
    font-style: italic;
  }

  @media (max-width: 520px) {
    .student-banner {
      padding: 14px 16px;
      gap: 8px;
      flex-direction: column;
      align-items: flex-start;
    }
    .student-name { font-size: 1.05rem; }
    .student-datetime { font-size: .8rem; }
  }

  /* === SUBMIT NOTICE === */
  .submit-notice {
    padding: 16px 20px;
    margin-bottom: 32px;
    background: #fffaf0;
    border: 2px solid var(--accent);
    border-left-width: 6px;
  }

  .submit-notice-label {
    font-family: var(--serif-en);
    font-style: italic;
    font-size: .72rem;
    color: var(--accent);
    letter-spacing: .1em;
    text-transform: uppercase;
    font-weight: 500;
    margin-bottom: 8px;
  }

  .submit-notice-body {
    font-family: var(--sans-jp);
    font-size: .92rem;
    color: var(--ink);
    line-height: 1.75;
  }

  .submit-notice-body strong {
    color: var(--ink);
    font-weight: 700;
    font-size: 1rem;
  }

  .submit-notice-caution {
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px dashed var(--rule);
    font-size: .82rem;
    color: var(--ink-soft);
    line-height: 1.6;
  }

  .submit-notice-caution u {
    text-decoration: underline;
    text-decoration-color: var(--accent);
    text-underline-offset: 3px;
    font-weight: 500;
  }

  @media (max-width: 520px) {
    .submit-notice { padding: 14px 16px; }
    .submit-notice-body { font-size: .88rem; }
    .submit-notice-body strong { font-size: .95rem; }
    .submit-notice-caution { font-size: .78rem; }
  }

  /* === QUIZ SCREEN === */
  .question-num {
    font-family: var(--serif-en);
    font-style: italic;
    font-size: .85rem;
    color: var(--muted);
    letter-spacing: .05em;
    margin-bottom: 12px;
  }

  .question-num::before {
    content: "—— ";
    color: var(--rule);
  }

  .question {
    font-family: var(--serif-en);
    font-size: clamp(1.15rem, 3.5vw, 1.4rem);
    line-height: 1.6;
    margin-bottom: 28px;
    color: var(--ink);
    font-weight: 400;
    letter-spacing: -.005em;
  }

  .options {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 24px;
  }

  .option {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 14px 18px;
    background: transparent;
    border: 1px solid var(--rule);
    text-align: left;
    cursor: pointer;
    font-family: var(--serif-en);
    font-size: 1.02rem;
    color: var(--ink);
    transition: all .15s;
    width: 100%;
    line-height: 1.4;
  }

  .option:hover:not(:disabled) {
    border-color: var(--ink);
    background: var(--paper-warm);
  }

  .option:disabled { cursor: default; }

  .option-letter {
    font-family: var(--serif-en);
    font-style: italic;
    font-weight: 500;
    color: var(--muted);
    min-width: 20px;
    flex-shrink: 0;
  }

  .option-text {
    flex: 1;
  }

  .option.correct {
    border-color: var(--correct);
    background: var(--correct-soft);
    color: var(--correct);
  }
  .option.correct .option-letter { color: var(--correct); }

  .option.wrong {
    border-color: var(--wrong);
    background: var(--wrong-soft);
    color: var(--wrong);
  }
  .option.wrong .option-letter { color: var(--wrong); }

  .option.dimmed {
    opacity: .55;
  }

  /* === FEEDBACK === */
  .feedback {
    margin-top: 8px;
    padding: 20px 22px;
    border-left: 3px solid var(--ink);
    background: var(--paper-warm);
    animation: slideIn .3s ease-out;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .feedback.correct { border-left-color: var(--correct); }
  .feedback.wrong { border-left-color: var(--wrong); }

  .feedback-verdict {
    font-family: var(--serif-en);
    font-style: italic;
    font-size: 1rem;
    font-weight: 500;
    margin-bottom: 10px;
    letter-spacing: .02em;
  }

  .feedback.correct .feedback-verdict { color: var(--correct); }
  .feedback.wrong .feedback-verdict { color: var(--wrong); }

  .feedback-verdict-jp {
    font-family: var(--sans-jp);
    font-size: .75rem;
    font-weight: 500;
    font-style: normal;
    color: var(--muted);
    margin-left: 8px;
    letter-spacing: .05em;
  }

  .feedback-body {
    font-size: .92rem;
    line-height: 1.75;
    color: var(--ink-soft);
  }

  .feedback-sentence {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 10px 14px;
    margin-bottom: 14px;
    background: rgba(47,93,47,.06);
    border: 1px solid rgba(47,93,47,.15);
    font-family: var(--serif-en);
    font-size: .98rem;
    line-height: 1.55;
    color: var(--correct);
  }

  .feedback-sentence.wrong-sentence {
    background: rgba(139,35,50,.04);
    border-color: rgba(139,35,50,.12);
    color: var(--ink-soft);
  }

  .feedback-sentence-text {
    flex: 1;
    font-style: italic;
  }

  .accent-btns {
    display: flex;
    gap: 6px;
    flex-shrink: 0;
    align-items: center;
  }

  .accent-btn {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 5px 10px;
    background: var(--correct);
    color: var(--paper);
    border: none;
    cursor: pointer;
    font-size: .72rem;
    font-family: var(--sans-jp);
    font-weight: 500;
    letter-spacing: .03em;
    transition: transform .12s, opacity .12s;
    white-space: nowrap;
  }

  .accent-btn:hover { opacity: .85; }
  .accent-btn:active { transform: scale(.93); }

  .accent-label {
    font-family: var(--serif-en);
    font-style: italic;
    font-size: .7rem;
  }

  .wrong-sentence .accent-btn {
    background: var(--muted);
  }

  @media (max-width: 520px) {
    .feedback-sentence { font-size: .9rem; padding: 8px 12px; flex-wrap: wrap; }
    .accent-btns { margin-top: 6px; }
    .accent-btn { padding: 4px 8px; font-size: .68rem; }
  }

  .feedback-correct-answer {
    font-family: var(--serif-en);
    color: var(--ink);
    font-weight: 500;
    font-style: italic;
  }

  /* === NAV === */
  .nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 28px;
    gap: 12px;
  }

  .nav-quit {
    font-family: var(--serif-en);
    font-style: italic;
    font-size: .85rem;
    color: var(--muted);
    background: none;
    border: none;
    cursor: pointer;
    padding: 8px 4px;
    text-decoration: underline;
    text-decoration-color: var(--rule);
    text-underline-offset: 4px;
  }
  .nav-quit:hover { color: var(--ink); }

  /* === RESULTS === */
  .results {
    padding: 20px 0;
  }

  .results-eyebrow {
    font-family: var(--serif-en);
    font-style: italic;
    color: var(--accent);
    font-size: 1rem;
    margin-bottom: 8px;
  }

  .results-title {
    font-family: var(--serif-jp);
    font-size: clamp(1.8rem, 5vw, 2.4rem);
    font-weight: 700;
    margin-bottom: 32px;
    line-height: 1.25;
  }

  .score-display {
    display: flex;
    align-items: baseline;
    gap: 16px;
    margin-bottom: 8px;
  }

  .score-big {
    font-family: var(--serif-en);
    font-size: clamp(4rem, 14vw, 6rem);
    font-weight: 300;
    line-height: 1;
    color: var(--ink);
    letter-spacing: -.02em;
    font-variant-numeric: tabular-nums;
  }

  .score-big sup {
    font-size: .4em;
    font-style: italic;
    color: var(--muted);
    font-weight: 400;
    margin-left: 4px;
  }

  .score-label {
    font-family: var(--serif-en);
    font-style: italic;
    color: var(--muted);
    font-size: 1rem;
  }

  .score-breakdown {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0;
    margin: 32px 0;
    border-top: 1px solid var(--rule);
    border-bottom: 1px solid var(--rule);
  }

  .score-cell {
    padding: 16px 12px;
    border-right: 1px solid var(--rule);
  }
  .score-cell:last-child { border-right: none; }

  .score-cell-label {
    font-family: var(--serif-en);
    font-style: italic;
    font-size: .7rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .08em;
    margin-bottom: 4px;
  }

  .score-cell-value {
    font-family: var(--serif-en);
    font-size: 1.4rem;
    font-weight: 500;
    font-variant-numeric: tabular-nums;
  }

  .score-cell.correct .score-cell-value { color: var(--correct); }
  .score-cell.wrong .score-cell-value { color: var(--wrong); }

  .results-msg {
    font-family: var(--serif-en);
    font-style: italic;
    font-size: 1.1rem;
    color: var(--ink-soft);
    margin-bottom: 32px;
    line-height: 1.6;
  }

  /* === REVIEW LIST === */
  .review-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 20px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--rule);
  }

  .review-title {
    font-family: var(--serif-en);
    font-style: italic;
    font-size: 1.1rem;
    color: var(--ink);
  }

  .review-title-jp {
    font-family: var(--sans-jp);
    font-size: .8rem;
    color: var(--muted);
    margin-left: 8px;
    letter-spacing: .05em;
  }

  .review-count {
    font-family: var(--serif-en);
    font-size: .85rem;
    color: var(--muted);
    font-variant-numeric: tabular-nums;
  }

  /* === UTILITIES === */
  .hidden { display: none !important; }

  .footer {
    margin-top: 60px;
    padding-top: 20px;
    border-top: 1px solid var(--rule);
    text-align: center;
    font-family: var(--serif-en);
    font-style: italic;
    font-size: .75rem;
    color: var(--muted);
    letter-spacing: .03em;
  }

  /* Mobile tweaks */
  @media (max-width: 520px) {
    .app { padding: 20px 16px 60px; }
    .start-specs, .score-breakdown {
      grid-template-columns: repeat(3, 1fr);
    }
    .spec, .score-cell { padding: 12px 8px; }
    .spec-value, .score-cell-value { font-size: 1.15rem; }
    .question { font-size: 1.1rem; }
    .option { font-size: .98rem; padding: 12px 14px; }
    .btn { padding: 12px 22px; font-size: .95rem; }
  }

  /* Print-like paper texture subtle */
  .app::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    background-image: radial-gradient(circle at 1px 1px, rgba(28,25,22,.015) 1px, transparent 0);
    background-size: 3px 3px;
    z-index: 0;
  }
  .app > * { position: relative; z-index: 1; }

  /* === Header right toolbar (rate selector + teacher badge) === */
  .header-right {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  .rate-control {
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }

  .rate-control-label {
    font-family: var(--sans-jp);
    font-size: .75rem;
    color: var(--muted);
    font-weight: 500;
    white-space: nowrap;
  }

  .rate-segment {

  }
  function clearSave() {
    try { localStorage.removeItem(STORAGE_KEY); } catch(e) {}
  }
  function loadHistory() {
    try {
      const raw = localStorage.getItem(HISTORY_KEY);
      if (!raw) return null;
      return JSON.parse(raw);
    } catch(e) { return null; }
  }
  function saveHistory(record) {
    // record = { score, correct, total, completedAt, studentName, studentId }
    try { localStorage.setItem(HISTORY_KEY, JSON.stringify(record)); } catch(e) {}
  }

  // ============================================================
  // Counters
  // ============================================================
  function countAnswered() { return state.answers.filter(a => a != null).length; }
  function countCorrect() { return state.answers.filter(a => a && a.correct).length; }
  function countWrong() { return state.answers.filter(a => a && !a.correct).length; }
  function isTeacher() {
    return state.studentId === TEACHER_ID && state.studentName === TEACHER_NAME;
  }

  // ============================================================
  // Render dispatcher
  // ============================================================
  function render() {
    if (typeof closePopup === 'function') closePopup();
    if (state.mode === 'start') renderStart();
    else if (state.mode === 'quiz') renderQuiz();
    else if (state.mode === 'result') renderResult();
    else if (state.mode === 'retry') renderRetry();
    window.scrollTo({top:0, behavior:'instant'});
  }

  // ============================================================
  // Header (with rate toggle and teacher badge)
  // ============================================================
  function renderHeader(showMeta) {
    const answered = countAnswered();
    const total = QUESTIONS.length;
    const correct = countCorrect();
    const percent = answered > 0 ? Math.round((correct / answered) * 100) : 0;
    const sessionLabel = `第${SESSION_NUMBER}回`;
    const showToolbar = state.mode !== 'start';
    return `
      <div class="header">
        <div class="brand">
          <span class="brand-session">${sessionLabel}</span>
          <span class="brand-main">TOEIC用語彙</span>
          ${SESSION_TITLE ? `<span class="brand-sub">${escapeHtml(SESSION_TITLE)}</span>` : ''}
          ${isTeacher() ? '<span class="teacher-badge">✨ Teacher</span>' : ''}
        </div>
        <div class="header-right">
          ${showMeta ? `<div class="meta">${answered}/${total} · ${percent}%</div>` : ''}
          ${showToolbar ? `
            <div class="rate-control">
              <span class="rate-control-label">音声速度</span>
              <div class="rate-segment">
                <button class="rate-segment-btn ${state.rateMode === 'normal' ? 'active' : ''}" data-action="set-rate-normal">速い</button>
                <button class="rate-segment-btn ${state.rateMode === 'slow' ? 'active' : ''}" data-action="set-rate-slow">ゆっくり</button>
              </div>
            </div>
          ` : ''}
        </div>
      </div>
    `;
  }

  // ============================================================
  // Progress bar
  // ============================================================
  function renderProgress() {
    const answered = countAnswered();
    const total = QUESTIONS.length;
    const correct = countCorrect();
    const wrong = countWrong();
    const percent = (answered / total) * 100;
    return `
      <div class="progress-wrap">
        <div class="progress-bar">
          <div class="progress-fill" style="width:${percent}%"></div>
        </div>
        <div class="progress-stats">
          <span>Q.${state.index + 1} <strong>/ ${total}</strong></span>
          <span>正答 <strong>${correct}</strong> · 誤答 <strong>${wrong}</strong></span>
        </div>
      </div>
    `;
  }

  function renderRetryProgress() {
    const total = state.retryList.length;
    const answered = state.retryAnswers.filter(a => a != null).length;
    const correct = state.retryAnswers.filter(a => a && a.correct).length;
    const wrong = state.retryAnswers.filter(a => a && !a.correct).length;
    const percent = (answered / total) * 100;
    return `
      <div class="progress-wrap">
        <div class="progress-bar">
          <div class="progress-fill" style="width:${percent}%"></div>
        </div>
        <div class="progress-stats">
          <span>Q.${state.retryIndex + 1} <strong>/ ${total}</strong></span>
          <span>正答 <strong>${correct}</strong> · 誤答 <strong>${wrong}</strong></span>
        </div>
      </div>
    `;
  }

        <h1 class="start-title">TOEIC用語彙</h1>

          </div>
          <div class="name-field">
            <label class="name-label" for="input-name">Student Name <span class="jp">氏名（必須）</span></label>
            <input type="text" id="input-name" class="name-input" placeholder="例：山田 太郎" value="${escapeHtml(saved && saved.studentName ? saved.studentName : '')}" autocomplete="name" required>

        <div class="btn-row">

          <p>解説中の<span class="underline-demo">下線の語</span>をタップすると、意味が表示されます。</p>

        </div>

    app.querySelectorAll('[data-action]').forEach(el => {

        const nameVal = nameInput ? nameInput.value.trim() : '';
        const idVal = idInput ? idInput.value.trim() : '';

        if (act === 'start' || act === 'restart') {

          }
          state.studentId = idVal;
          state.studentName = nameVal;

          state.mode = 'quiz';

            if (nameInput) nameInput.focus();

          }
          const s = load();
          state.studentId = idVal;
          state.studentName = nameVal;
          state.completedAt = s && s.completedAt ? s.completedAt : null;
          state.answers = s && s.answers && s.answers.length === QUESTIONS.length
            ? s.answers
            : new Array(QUESTIONS.length).fill(null);
          state.order = s && s.order && s.order.length === QUESTIONS.length
            ? s.order
            : makeOrder();
          state.index = s && typeof s.index === 'number' ? Math.min(s.index, QUESTIONS.length - 1) : 0;
          state.answered = state.answers[state.index] != null;
          state.rateMode = (s && s.rateMode) || 'normal';
          state.retryList = (s && s.retryList) || [];
          state.retryAnswers = (s && s.retryAnswers) || [];
          state.retryIndex = (s && typeof s.retryIndex === 'number') ? s.retryIndex : 0;
          state.retryCompletedAt = (s && s.retryCompletedAt) || null;
          // Resume to the appropriate phase
          if (s && s.mode === 'retry') {
            state.mode = 'retry';
          } else if (state.completedAt && countAnswered() === QUESTIONS.length) {
            state.mode = 'result';
          } else {
            state.mode = 'quiz';
          }
          save();
          render();
        }
      });
    });
  }

  // ============================================================
  // Quiz screen
  // ============================================================
  function currentQ() {
    return QUESTIONS[state.order[state.index]];
  }

  function renderQuiz() {
    if (!state.order || state.order.length !== QUESTIONS.length) {
      state.order = makeOrder();
      save();
    }
    const q = currentQ();
    const existing = state.answers[state.index];
    const answered = existing != null;
    state.answered = answered;

    app.innerHTML = `
      ${renderHeader(true)}
      ${renderProgress()}
      <div class="question-num">Question ${state.index + 1}</div>
      <div class="question">${escapeHtml(q.q)}</div>
      <div class="options">
        ${q.opts.map((opt, i) => {
          const num = i + 1;
          const letter = String.fromCharCode(65 + i);
          let cls = 'option';
          if (answered) {
            cls += ' dimmed';
            if (num === q.ans) cls = 'option correct';
            else if (num === existing.chosen) cls = 'option wrong';
          }
          return `
            <button class="${cls}" data-num="${num}" ${answered ? 'disabled' : ''}>
              <span class="option-letter">(${letter})</span>
              <span class="option-text">${escapeHtml(opt)}</span>
            </button>
          `;
        }).join('')}
      </div>
      ${(!answered && isTeacher()) ? renderTeacherHint(q) : ''}
      ${answered ? renderFeedback(q, existing) : ''}
      <div class="nav">
        <button class="nav-quit" data-action="quit">一時中断して最初に戻る</button>
        ${answered ? `
          <button class="btn" data-action="next">
            ${state.index === QUESTIONS.length - 1 ? '結果を見る' : '次の問題'} <span class="btn-arrow">→</span>
          </button>
        ` : ''}
      </div>
      <div class="footer">© Kaoruko Takechi 2026</div>
    `;

    bindCommonHandlers();
    app.querySelectorAll('.option:not([disabled])').forEach(el => {
      el.addEventListener('click', () => {
        const num = parseInt(el.dataset.num, 10);
        const correct = num === q.ans;
        state.answers[state.index] = { chosen: num, correct: correct };
        state.answered = true;
        save();
        render();
      });
    });
    app.querySelectorAll('[data-action]').forEach(el => {
      el.addEventListener('click', () => {
        const act = el.dataset.action;
        if (act === 'next') {
          if (state.index === QUESTIONS.length - 1) {
            state.mode = 'result';
            recordHistoryIfNew();
          } else {
            state.index++;
            state.answered = state.answers[state.index] != null;
          }
          save();
          render();
        } else if (act === 'quit') {
          state.mode = 'start';
          render();
        }
      });
    });
  }

  function renderTeacherHint(q) {
    const letter = String.fromCharCode(64 + q.ans);
    const word = q.opts[q.ans - 1];
    return `<div class="teacher-hint">👁 Teacher view — Correct: (${letter}) <strong>${escapeHtml(word)}</strong></div>`;
  }

  // ============================================================
  // Feedback (after answer)
  // ============================================================
  function renderFeedback(q, ans) {
    const isCorrect = ans.correct;
    const letter = String.fromCharCode(64 + q.ans);
    const correctWord = q.opts[q.ans - 1];
    const fullSentence = q.q.replace(/_____/g, correctWord);
    return `
      <div class="feedback ${isCorrect ? 'correct' : 'wrong'}">
        <div class="feedback-verdict">
          ${isCorrect ? 'Correct' : 'Incorrect'}
          <span class="feedback-verdict-jp">${isCorrect ? '正解' : '不正解'} · 正答は (${letter}) <span class="feedback-correct-answer">${escapeHtml(correctWord)}</span></span>
        </div>
        <div class="feedback-sentence ${isCorrect ? '' : 'wrong-sentence'}">
          <span class="feedback-sentence-text">${escapeHtml(fullSentence)}</span>
          <div class="accent-btns">
            ${renderAccentButtons(fullSentence)}
          </div>
        </div>
        <div class="feedback-body">${renderTextWithMatches(q.exp, q.eMatches || [])}</div>
      </div>
    `;
  }

  // ============================================================
  // Speech (manual only, applies rateMode)
  // ============================================================
  const ACCENTS = [
    { code: 'en-US', label: 'US', flag: '🇺🇸' },
    { code: 'en-GB', label: 'UK', flag: '🇬🇧' },
  ];

  function getVoiceForAccent(accentCode) {
    const voices = window.speechSynthesis.getVoices();
    const code = accentCode.replace('_', '-');
    let v = voices.find(v => v.lang.replace('_', '-') === code);
    if (!v) v = voices.find(v => v.lang.replace('_', '-').startsWith(code));
    if (!v) v = voices.find(v => v.lang.startsWith('en'));
    return v || null;
  }

  function speakSentence(text, accentCode) {
    try {
      if (!('speechSynthesis' in window)) return;
      window.speechSynthesis.cancel();
      setTimeout(() => {
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = accentCode || 'en-US';
        utterance.rate = state.rateMode === 'slow' ? 0.85 : 1.15;
        utterance.pitch = 1;
        const voice = getVoiceForAccent(accentCode || 'en-US');
        if (voice) utterance.voice = voice;
        window.speechSynthesis.speak(utterance);
      }, 100);
    } catch(e) {}
  }

  function renderAccentButtons(fullSentence) {
    const escaped = escapeHtml(fullSentence);
    return ACCENTS.map(a =>
      `<button class="accent-btn" data-speak="${escaped}" data-accent="${a.code}" title="${a.label} English">${a.flag}<span class="accent-label">${a.label}</span></button>`
    ).join('');
  }

  if ('speechSynthesis' in window) {
    window.speechSynthesis.getVoices();
    window.speechSynthesis.onvoiceschanged = () => { window.speechSynthesis.getVoices(); };
  }

  // ============================================================
  // Common bindings (rate toggle, accent buttons)
  // ============================================================
  function bindCommonHandlers() {
    app.querySelectorAll('.accent-btn').forEach(el => {
      el.addEventListener('click', () => {
        const text = el.dataset.speak;
        const accent = el.dataset.accent;
        if (text) speakSentence(text, accent);
      });
    });
    app.querySelectorAll('[data-action="set-rate-normal"]').forEach(el => {
      el.addEventListener('click', () => {
        if (state.rateMode !== 'normal') {
          state.rateMode = 'normal';
          save();
          render();
        }
      });
    });
    app.querySelectorAll('[data-action="set-rate-slow"]').forEach(el => {
      el.addEventListener('click', () => {
        if (state.rateMode !== 'slow') {
          state.rateMode = 'slow';
          save();
          render();
        }
      });
    });
    bindClickableWords();
  }

  // ============================================================
  // Result screen
  // ============================================================
  function recordHistoryIfNew() {
    if (state.completedAt) return;
    state.completedAt = new Date().toISOString();
    const correct = countCorrect();
    const total = QUESTIONS.length;
    const score = total > 0 ? Math.round((correct / total) * 100) : 0;
    saveHistory({
      score, correct, total,
      completedAt: state.completedAt,
      studentName: state.studentName,
      studentId: state.studentId,
    });
    save();
  }

  function renderResult() {
    if (!state.completedAt) recordHistoryIfNew();

    const answered = countAnswered();
    const correct = countCorrect();
    const wrong = answered - correct;
    const percent = answered > 0 ? Math.round((correct / answered) * 100) : 0;

    let msg = '';
    if (percent >= 90) msg = 'Excellent — 9割超え。この水準を維持。';
    else if (percent >= 75) msg = 'Strong — 安定した実力。誤答を見直して完璧に。';
    else if (percent >= 60) msg = 'Solid — 基礎は固まっている。弱点を潰していこう。';
    else if (percent >= 40) msg = 'Building — 復習モードで間違いを潰そう。';
    else msg = 'Starting out — まずは解説を読み込んで、再挑戦を。';

    const wrongPositions = state.answers
      .map((a, i) => (a && !a.correct) ? i : -1)
      .filter(i => i >= 0);

    const completedDate = new Date(state.completedAt);
    const completedStr = completedDate.toLocaleDateString('ja-JP', {
      year: 'numeric', month: 'long', day: 'numeric'
    });

    // Score comparison: compare current with previous history (excluding self)
    const history = loadHistory();
    let comparisonHtml = '';
    if (history && history.completedAt !== state.completedAt) {
      const delta = percent - history.score;
      let deltaClass = 'same';
      let deltaSign = '±';
      if (delta > 0) { deltaClass = 'up'; deltaSign = '+'; }
      else if (delta < 0) { deltaClass = 'down'; deltaSign = ''; }
      const prevDate = new Date(history.completedAt);
      const prevStr = prevDate.toLocaleDateString('ja-JP', {month: 'long', day: 'numeric'});
      comparisonHtml = `
        <div class="score-comparison">
          <div class="score-comparison-label">Compared to last attempt · 前回比較</div>
          <div class="score-comparison-row">
            <span>${prevStr}：<strong>${history.score}%</strong> (${history.correct}/${history.total})</span>
            <span>→</span>
            <span>今回：<strong>${percent}%</strong> (${correct}/${QUESTIONS.length})</span>
            <span class="score-delta ${deltaClass}">${deltaSign}${delta}pt</span>
          </div>
        </div>
      `;
    }

    app.innerHTML = `
      ${renderHeader(false)}
      <div class="student-banner">
        <div>
          <span class="student-name-jp">Student</span>
          <span class="student-name">${escapeHtml(state.studentName || '(名前未入力)')}</span>
          ${state.studentId ? `<span class="student-id"> · ${escapeHtml(state.studentId)}</span>` : ''}
        </div>
        <div class="student-datetime">${completedStr}</div>
      </div>

      <div class="submit-notice">
        <div class="submit-notice-label">Submission · 提出方法</div>
        <div class="submit-notice-body">
          <strong>この画面全体をスクリーンショットして、先生に提出してください。</strong><br>
          氏名・学籍番号・正答率・完了日時がこの1画面に収まっています。
          <div class="submit-notice-caution">※ 下の「間違いを再挑戦」を押すと別画面に移ります。スクリーンショットは<u>この画面</u>を撮ってください。</div>
        </div>
      </div>

      <div class="results">
        <div class="results-eyebrow">Result</div>
        <h1 class="results-title">お疲れさまでした。</h1>

        <div class="score-display">
          <div class="score-big">${percent}<sup>%</sup></div>
          <div class="score-label">accuracy</div>
        </div>

        <div class="score-breakdown">
          <div class="score-cell">
            <div class="score-cell-label">Answered</div>
            <div class="score-cell-value">${answered} / ${QUESTIONS.length}</div>
          </div>
          <div class="score-cell correct">
            <div class="score-cell-label">Correct</div>
            <div class="score-cell-value">${correct}</div>
          </div>
          <div class="score-cell wrong">
            <div class="score-cell-label">Wrong</div>
            <div class="score-cell-value">${wrong}</div>
          </div>
        </div>

        <p class="results-msg">${msg}</p>
        ${comparisonHtml}

        <div class="btn-row" style="margin-top:24px;">
          ${wrong > 0 ? `<button class="btn" data-action="retry-wrong">📝 間違えた ${wrong}問を再挑戦 <span class="btn-arrow">→</span></button>` : ''}
          <button class="btn btn-ghost" data-action="restart-all">🔄 最初から解き直す</button>
        </div>

        <div class="footer">© Kaoruko Takechi 2026</div>
      </div>
    `;

    bindCommonHandlers();
    app.querySelectorAll('[data-action]').forEach(el => {
      el.addEventListener('click', () => {
        const act = el.dataset.action;
        if (act === 'retry-wrong') {
          state.retryList = wrongPositions.slice();
          state.retryAnswers = new Array(state.retryList.length).fill(null);
          state.retryIndex = 0;
          state.retryCompletedAt = null;
          state.mode = 'retry';
          save();
          render();
        } else if (act === 'restart-all') {
          // Keep id/name. Reset everything else, re-shuffle.
          state.answers = new Array(QUESTIONS.length).fill(null);
          state.order = makeOrder();
          state.index = 0;
          state.answered = false;
          state.completedAt = null;
          state.retryList = [];
          state.retryAnswers = [];
          state.retryIndex = 0;
          state.retryCompletedAt = null;
          state.mode = 'quiz';
          save();
          render();
        }
      });
    });
  }

  // ============================================================
  // Retry mode (re-attempt wrong questions)
  // ============================================================
  function currentRetryQ() {
    const pos = state.retryList[state.retryIndex];
    return QUESTIONS[state.order[pos]];
  }

  function renderRetry() {
    if (state.retryList.length === 0) {
      state.mode = 'result';
      render();
      return;
    }
    const q = currentRetryQ();
    const total = state.retryList.length;
    const existing = state.retryAnswers[state.retryIndex];
    const answered = existing != null;
    const originalPos = state.retryList[state.retryIndex];

    app.innerHTML = `
      ${renderHeader(false)}
      <div class="retry-banner">
        <span class="retry-banner-label">Retry</span>
        <strong>間違えた${total}問の再挑戦中</strong> — もう一度解いて、定着を確認しよう。
      </div>
      ${renderRetryProgress()}
      <div class="question-num">Question ${originalPos + 1} (re-attempt)</div>
      <div class="question">${escapeHtml(q.q)}</div>
      <div class="options">
        ${q.opts.map((opt, i) => {
          const num = i + 1;
          const letter = String.fromCharCode(65 + i);
          let cls = 'option';
          if (answered) {
            cls += ' dimmed';
            if (num === q.ans) cls = 'option correct';
            else if (num === existing.chosen) cls = 'option wrong';
          }
          return `
            <button class="${cls}" data-num="${num}" ${answered ? 'disabled' : ''}>
              <span class="option-letter">(${letter})</span>
              <span class="option-text">${escapeHtml(opt)}</span>
            </button>
          `;
        }).join('')}
      </div>
      ${(!answered && isTeacher()) ? renderTeacherHint(q) : ''}
      ${answered ? renderFeedback(q, existing) : ''}
      <div class="nav">
        <button class="nav-quit" data-action="back-to-result">結果に戻る</button>
        ${answered ? `
          <button class="btn" data-action="retry-next">
            ${state.retryIndex === total - 1 ? '結果画面に戻る' : '次の問題'} <span class="btn-arrow">→</span>
          </button>
        ` : ''}
      </div>
      <div class="footer">© Kaoruko Takechi 2026</div>
    `;

    bindCommonHandlers();
    app.querySelectorAll('.option:not([disabled])').forEach(el => {
      el.addEventListener('click', () => {
        const num = parseInt(el.dataset.num, 10);
        const correct = num === q.ans;
        state.retryAnswers[state.retryIndex] = { chosen: num, correct: correct };
        save();
        render();
      });
    });
    app.querySelectorAll('[data-action]').forEach(el => {
      el.addEventListener('click', () => {
        const act = el.dataset.action;
        if (act === 'retry-next') {
          if (state.retryIndex === state.retryList.length - 1) {
            // 再挑戦完了 → 初回結果画面に戻る（高専仕様：再挑戦は内部復習扱い、スコアには反映しない）
            state.mode = 'result';
          } else {
            state.retryIndex++;
          }
          save();
          render();
        } else if (act === 'back-to-result') {
          state.mode = 'result';
          render();
        }
      });
    });
  }


  // ============================================================
  // Dictionary popup: renderTextWithMatches
  // ============================================================
  // matches: [{start, end, term, meaning, original}] (sorted by start)
  // Returns HTML with clickable spans for matched words.
  function renderTextWithMatches(text, matches) {
    if (!matches || matches.length === 0) {
      return escapeHtml(text);
    }
    // Sort by start
    const sorted = matches.slice().sort((a, b) => a.start - b.start);
    let html = '';
    let cursor = 0;
    for (const m of sorted) {
      if (m.start < cursor) continue; // skip overlapping
      // Plain text before this match
      if (m.start > cursor) {
        html += escapeHtml(text.substring(cursor, m.start));
      }
      // Matched word as clickable
      const word = text.substring(m.start, m.end);
      const dataMeaning = escapeHtml(m.meaning).replace(/'/g, "&#39;");
      const dataTerm = escapeHtml(m.term).replace(/'/g, "&#39;");
      html += `<span class="clickable-word" data-term="${dataTerm}" data-meaning="${dataMeaning}">${escapeHtml(word)}</span>`;
      cursor = m.end;
    }
    // Trailing plain text
    if (cursor < text.length) {
      html += escapeHtml(text.substring(cursor));
    }
    return html;
  }

  // Popup management
  let activePopupEl = null;
  let activeWordEl = null;

  function closePopup() {
    if (activePopupEl) {
      activePopupEl.remove();
      activePopupEl = null;
    }
    if (activeWordEl) {
      activeWordEl.classList.remove('active');
      activeWordEl = null;
    }
    document.removeEventListener('click', onDocClickToClose, true);
    document.removeEventListener('keydown', onEscToClose);
  }

  function onDocClickToClose(e) {
    if (activePopupEl && !activePopupEl.contains(e.target) && !e.target.classList.contains('clickable-word')) {
      closePopup();
    }
  }

  function onEscToClose(e) {
    if (e.key === 'Escape') closePopup();
  }

  function showPopup(wordEl) {
    closePopup();
    const term = wordEl.dataset.term || '';
    const meaning = wordEl.dataset.meaning || '';
    if (!meaning) return;

    const popup = document.createElement('div');
    popup.className = 'word-popup';
    popup.innerHTML = `
      <button class="word-popup-close" type="button" aria-label="閉じる">×</button>
      <div class="word-popup-headword">${escapeHtml(term)}</div>
      <div class="word-popup-meaning">${escapeHtml(meaning)}</div>
    `;
    document.body.appendChild(popup);

    // Position below the word
    const rect = wordEl.getBoundingClientRect();
    const popupRect = popup.getBoundingClientRect();
    let left = rect.left;
    let top = rect.bottom + 6;
    // Adjust if overflowing right
    if (left + popupRect.width > window.innerWidth - 12) {
      left = Math.max(12, window.innerWidth - popupRect.width - 12);
    }
    // Adjust if overflowing bottom (show above)
    if (top + popupRect.height > window.innerHeight - 12) {
      top = Math.max(12, rect.top - popupRect.height - 6);
    }
    popup.style.left = left + 'px';
    popup.style.top = top + 'px';

    activePopupEl = popup;
    activeWordEl = wordEl;
    wordEl.classList.add('active');

    popup.querySelector('.word-popup-close').addEventListener('click', (e) => {
      e.stopPropagation();
      closePopup();
    });

    // Use capture to catch clicks before they reach buttons
    setTimeout(() => {
      document.addEventListener('click', onDocClickToClose, true);
      document.addEventListener('keydown', onEscToClose);
    }, 0);
  }

  function bindClickableWords() {
    app.querySelectorAll('.clickable-word').forEach(el => {
      el.addEventListener('click', (e) => {
        e.stopPropagation();
        showPopup(el);
      });
    });
  }

  function escapeHtml(s) {
    return String(s)
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;')
      .replace(/'/g,'&#39;');
  }

  // ============================================================
  // Initialize
  // ============================================================
  function init() {
    state.answers = new Array(QUESTIONS.length).fill(null);
    render();
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
</body>
</html>
